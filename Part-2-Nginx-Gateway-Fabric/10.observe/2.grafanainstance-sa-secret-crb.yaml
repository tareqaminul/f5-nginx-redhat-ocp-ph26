# 1. Grafana instance
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: grafana
  labels:
    dashboards: grafana
spec:
  config:
    security:
      admin_user: admin
      admin_password: mabuhay123
---
# 2. ServiceAccount Grafana will use to query Thanos
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-thanos
  namespace: grafana
---
# 3. Long-lived token for that SA
apiVersion: v1
kind: Secret
metadata:
  name: grafana-thanos-token
  namespace: grafana
  annotations:
    kubernetes.io/service-account.name: grafana-thanos
type: kubernetes.io/service-account-token
---
# 4. Permission to read cluster metrics
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-thanos-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
- kind: ServiceAccount
  name: grafana-thanos
  namespace: grafana
