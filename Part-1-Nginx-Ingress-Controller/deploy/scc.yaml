# SecurityContextConstraints for NGINX Ingress Controller on OpenShift.
#
# Why this is needed:
#   OpenShift's default `restricted-v2` SCC rejects the NGINX IC pod because the
#   image runs as a fixed UID (101) and needs NET_BIND_SERVICE to bind 80/443.
#   This SCC permits exactly those two things and nothing more.
#
# Apply:
#   oc apply -f openshift/scc.yaml
#   oc adm policy add-scc-to-user nginx-ingress-admin -z nginx-ingress -n nginx-ingress
#
# The `users` entry below already grants any ServiceAccount named `nginx-ingress`
# in any namespace, so the explicit `add-scc-to-user` is belt-and-suspenders.
kind: SecurityContextConstraints
apiVersion: security.openshift.io/v1
metadata:
  name: nginx-ingress-admin
allowPrivilegedContainer: false
allowPrivilegeEscalation: false
runAsUser:
  type: MustRunAs
  uid: 101
seLinuxContext:
  type: MustRunAs
fsGroup:
  type: MustRunAs
supplementalGroups:
  type: MustRunAs
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowHostDirVolumePlugin: false
allowHostIPC: false
readOnlyRootFilesystem: false
seccompProfiles:
  - runtime/default
volumes:
  - secret
  - configMap
  - downwardAPI
  - emptyDir
  - projected
requiredDropCapabilities:
  - ALL
allowedCapabilities:
  - NET_BIND_SERVICE
users:
  - 'system:serviceaccount:*:nginx-ingress'
